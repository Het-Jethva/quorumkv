name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        if: runner.os == 'Linux'
        shell: bash
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test ./...
      - name: Build commands
        run: go build ./cmd/...
      - name: Race detection
        if: runner.os == 'Linux'
        run: go test -race ./...
      - name: Vet
        run: go vet ./...

  seeded-simulation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run replayable fault schedules
        shell: bash
        run: |
          mkdir -p .traces
          go build -o .traces/quorumkvsim ./cmd/quorumkvsim
          for seed in $(seq 1 50); do
            .traces/quorumkvsim -seed "$seed" -steps 1000 -trace ".traces/seed-$seed.json"
          done
      - name: Store failing simulation traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-traces
          path: .traces/*.json
          if-no-files-found: error

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false

  protobuf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Lint and regenerate Protobuf
        run: |
          go run github.com/bufbuild/buf/cmd/buf@v1.57.2 lint
          go run github.com/bufbuild/buf/cmd/buf@v1.57.2 generate
          git diff --exit-code
