syntax = "proto3";

package quorumkv.v1;

option go_package = "github.com/Het-Jethva/quorumkv/gen/quorumkv/v1;quorumkvv1";

service NodeService {
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
}

service ClientService {
  rpc OpenSession(OpenSessionRequest) returns (OpenSessionResponse);
  rpc CloseSession(CloseSessionRequest) returns (CloseSessionResponse);
  rpc Set(SetRequest) returns (SetResponse);
}

service PeerService {
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);
  rpc Send(SendRequest) returns (SendResponse);
}

message GetStatusRequest {}

message OpenSessionRequest {}

message OpenSessionResponse {
  bytes session_id = 1;
}

message CloseSessionRequest {
  bytes session_id = 1;
}

message CloseSessionResponse {}

message SetRequest {
  bytes session_id = 1;
  uint64 sequence = 2;
  string key = 3;
  bytes value = 4;
}

message SetResponse {}

// NotLeader is attached to a FailedPrecondition status when the receiving
// Node knows where the client should retry directly.
message NotLeader {
  string leader_id = 1;
  string leader_address = 2;
}

message GetStatusResponse {
  string cluster_id = 1;
  string node_id = 2;
  NodeState state = 3;
  string peer_address = 4;
  string client_address = 5;
  RaftRole role = 6;
  string leader_id = 7;
  uint64 term = 8;
}

enum NodeState {
  NODE_STATE_UNSPECIFIED = 0;
  NODE_STATE_STARTING = 1;
  NODE_STATE_READY = 2;
}

enum RaftRole {
  RAFT_ROLE_UNSPECIFIED = 0;
  RAFT_ROLE_FOLLOWER = 1;
  RAFT_ROLE_PRE_CANDIDATE = 2;
  RAFT_ROLE_CANDIDATE = 3;
  RAFT_ROLE_LEADER = 4;
}

message HandshakeRequest {
  uint32 protocol_version = 1;
  string cluster_id = 2;
  string node_id = 3;
  string target_node_id = 4;
  uint32 active_session_limit = 5;
}

message HandshakeResponse {
  uint32 protocol_version = 1;
  string cluster_id = 2;
  string node_id = 3;
  uint32 active_session_limit = 4;
}

message SendRequest {
  uint32 protocol_version = 1;
  string cluster_id = 2;
  string from_node_id = 3;
  string to_node_id = 4;
  oneof message {
    PreVoteRequest pre_vote_request = 5;
    PreVoteResponse pre_vote_response = 6;
    VoteRequest vote_request = 7;
    VoteResponse vote_response = 8;
    AppendEntriesRequest append_entries_request = 9;
    AppendEntriesResponse append_entries_response = 10;
  }
}

message SendResponse {}

message PreVoteRequest {
  uint64 term = 1;
  uint64 last_log_index = 2;
  uint64 last_log_term = 3;
}

message PreVoteResponse {
  uint64 term = 1;
  uint64 current_term = 2;
  bool granted = 3;
}

message VoteRequest {
  uint64 term = 1;
  uint64 last_log_index = 2;
  uint64 last_log_term = 3;
}

message VoteResponse {
  uint64 term = 1;
  bool granted = 2;
}

message AppendEntriesRequest {
  uint64 term = 1;
  uint64 previous_log_index = 2;
  uint64 previous_log_term = 3;
  repeated RaftLogEntry entries = 4;
  uint64 leader_commit = 5;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 match_index = 3;
}

message RaftLogEntry {
  uint64 index = 1;
  uint64 term = 2;
  RaftEntryType type = 3;
  bytes session_id = 4;
  uint64 sequence = 5;
  string key = 6;
  bytes value = 7;
}

enum RaftEntryType {
  RAFT_ENTRY_TYPE_UNSPECIFIED = 0;
  RAFT_ENTRY_TYPE_NO_OP = 1;
  RAFT_ENTRY_TYPE_OPEN_SESSION = 2;
  RAFT_ENTRY_TYPE_CLOSE_SESSION = 3;
  RAFT_ENTRY_TYPE_SET = 4;
}
