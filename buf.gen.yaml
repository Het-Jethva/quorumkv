version: v2
plugins:
  - local:
      - go
      - run
      - google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
    out: gen
    opt: paths=source_relative
  - local:
      - go
      - run
      - google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1
    out: gen
    opt: paths=source_relative
inputs:
  - directory: api
